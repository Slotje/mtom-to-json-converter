<bldc-container>
  <!-- Header -->
  <bldc-header>
    <bldc-logo>BTE</bldc-logo>
    <bldc-heading level="1">MTOM-to-JSON Converter</bldc-heading>
    <bldc-paragraph>Klantconfiguratie mapping tool voor Bulk Toevoer ECM</bldc-paragraph>
  </bldc-header>

  <!-- Navigation -->
  <nav class="app-nav">
    <bldc-button [attr.type]="isKlantPage ? 'primary' : 'tertiary'" elem-title="Klantconfiguratie"
      (bldcClick)="navigateTo('/klantconfiguratie')"></bldc-button>
    <bldc-button [attr.type]="!isKlantPage ? 'primary' : 'tertiary'" elem-title="Converter"
      (bldcClick)="navigateTo('/config')"></bldc-button>
  </nav>

  <!-- Progress wizard (only on converter pages) -->
  <bldc-step-indicator *ngIf="!isKlantPage" type="horizontal" [attr.active-step]="wizard.currentStepIndex + 1">
    <bldc-step
      step-text="1"
      circle-aria-label="Stap 1"
      bldcRouterLink="/config">
      <span slot="label">YAML Config</span>
      <span slot="sublabel">Upload mapping</span>
    </bldc-step>
    <bldc-step
      step-text="2"
      circle-aria-label="Stap 2"
      bldcRouterLink="/analyze">
      <span slot="label">MTOM Analyse</span>
      <span slot="sublabel">Bronbestand</span>
    </bldc-step>
    <bldc-step
      step-text="3"
      circle-aria-label="Stap 3"
      bldcRouterLink="/mapping">
      <span slot="label">Mapping</span>
      <span slot="sublabel">MTOM naar JSON</span>
    </bldc-step>
    <bldc-step
      step-text="4"
      circle-aria-label="Stap 4"
      bldcRouterLink="/validation">
      <span slot="label">Validatie</span>
      <span slot="sublabel">Drielaags</span>
    </bldc-step>
    <bldc-step
      step-text="5"
      circle-aria-label="Stap 5"
      bldcRouterLink="/result">
      <span slot="label">Resultaat</span>
      <span slot="sublabel">JSON output</span>
    </bldc-step>
  </bldc-step-indicator>

  <!-- Routed content -->
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <bldc-footer>
    <span>BTE POC &mdash; MTOM-to-JSON Converter</span>
    <bldc-divider></bldc-divider>
    <span>Belastingdienst &mdash; Bulk Toevoer ECM</span>
  </bldc-footer>
</bldc-container>
