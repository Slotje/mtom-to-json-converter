<bldc-container>
  <!-- Header -->
  <bldc-header>
    <bldc-logo>BTE</bldc-logo>
    <bldc-heading level="1">MTOM-to-JSON Converter</bldc-heading>
    <bldc-paragraph>Klantconfiguratie mapping tool voor Bulk Toevoer ECM</bldc-paragraph>
  </bldc-header>

  <!-- Progress wizard with Bold routing -->
  <bldc-step-indicator>
    <div *ngFor="let step of wizard.steps; let i = index; let last = last"
         class="wizard-step-wrapper">
      <bldc-link
        [bldcRouterLink]="step.route"
        [class.active]="wizard.currentStepIndex === i"
        [class.completed]="wizard.currentStepIndex > i"
        [class.upcoming]="wizard.currentStepIndex < i">
        <div class="step-circle">
          <span *ngIf="wizard.currentStepIndex <= i">{{ i + 1 }}</span>
          <bldc-icon *ngIf="wizard.currentStepIndex > i" name="check"></bldc-icon>
        </div>
        <div class="step-info">
          <bldc-label>{{ step.label }}</bldc-label>
          <bldc-paragraph>{{ step.desc }}</bldc-paragraph>
        </div>
      </bldc-link>
      <bldc-divider *ngIf="!last" [class.done]="wizard.currentStepIndex > i"></bldc-divider>
    </div>
  </bldc-step-indicator>

  <!-- Routed content -->
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <bldc-footer>
    <span>BTE POC &mdash; MTOM-to-JSON Converter</span>
    <bldc-divider></bldc-divider>
    <span>Belastingdienst &mdash; Bulk Toevoer ECM</span>
  </bldc-footer>
</bldc-container>
