<bldc-container>
  <!-- Header -->
  <bldc-header>
    <bldc-logo>BTE</bldc-logo>
    <bldc-heading level="1">MTOM-to-JSON Converter</bldc-heading>
    <bldc-paragraph>Klantconfiguratie mapping tool voor Bulk Toevoer ECM</bldc-paragraph>
  </bldc-header>

  <!-- Progress wizard with Bold step-indicator -->
  <bldc-step-indicator type="horizontal">
    <bldc-step
      [attr.step-text]="wizard.currentStepIndex > 0 ? null : '1'"
      [attr.icon]="wizard.currentStepIndex > 0 ? 'check' : null"
      [attr.circle-aria-label]="'Stap 1'"
      [attr.bldcRouterLink]="'/config'">
      <span slot="label">YAML Config</span>
      <span slot="sublabel">Upload mapping</span>
    </bldc-step>
    <bldc-step
      [attr.step-text]="wizard.currentStepIndex > 1 ? null : '2'"
      [attr.icon]="wizard.currentStepIndex > 1 ? 'check' : null"
      [attr.circle-aria-label]="'Stap 2'"
      [attr.bldcRouterLink]="'/analyze'">
      <span slot="label">MTOM Analyse</span>
      <span slot="sublabel">Bronbestand</span>
    </bldc-step>
    <bldc-step
      [attr.step-text]="wizard.currentStepIndex > 2 ? null : '3'"
      [attr.icon]="wizard.currentStepIndex > 2 ? 'check' : null"
      [attr.circle-aria-label]="'Stap 3'"
      [attr.bldcRouterLink]="'/mapping'">
      <span slot="label">Mapping</span>
      <span slot="sublabel">MTOM naar JSON</span>
    </bldc-step>
    <bldc-step
      [attr.step-text]="wizard.currentStepIndex > 3 ? null : '4'"
      [attr.icon]="wizard.currentStepIndex > 3 ? 'check' : null"
      [attr.circle-aria-label]="'Stap 4'"
      [attr.bldcRouterLink]="'/validation'">
      <span slot="label">Validatie</span>
      <span slot="sublabel">Drielaags</span>
    </bldc-step>
    <bldc-step
      step-text="5"
      [attr.circle-aria-label]="'Stap 5'"
      [attr.bldcRouterLink]="'/result'">
      <span slot="label">Resultaat</span>
      <span slot="sublabel">JSON output</span>
    </bldc-step>
  </bldc-step-indicator>

  <!-- Routed content -->
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer -->
  <bldc-footer>
    <span>BTE POC &mdash; MTOM-to-JSON Converter</span>
    <bldc-divider></bldc-divider>
    <span>Belastingdienst &mdash; Bulk Toevoer ECM</span>
  </bldc-footer>
</bldc-container>
