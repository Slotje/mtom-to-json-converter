<bldc-container *ngIf="result">
  <bldc-heading level="2">Conversie Resultaat: MTOM &#10142; JSON</bldc-heading>

  <bldc-notification [attr.type]="result.success ? 'success' : 'error'"
    [attr.elem-title]="result.success ? 'MTOM bericht succesvol geconverteerd naar JSON' : 'Conversie voltooid met validatiefouten'">
    <bldc-paragraph>{{ extractedFieldEntries.length }} velden geextraheerd uit het MTOM bericht</bldc-paragraph>
  </bldc-notification>

  <div class="action-buttons">
    <bldc-button type="primary" elem-title="Download JSON" icon="download" icon-pos="left"
      (bldcClick)="downloadJson()">
    </bldc-button>
    <bldc-button type="secondary" elem-title="Kopieer" icon="copy" icon-pos="left"
      (bldcClick)="copyJson()">
    </bldc-button>
  </div>

  <!-- Side by side: MTOM fields -> JSON output -->
  <div class="comparison">
    <!-- Left: Extracted from MTOM -->
    <div class="source-panel">
      <bldc-heading level="3">Geextraheerd uit MTOM ({{ extractedFieldEntries.length }} velden)</bldc-heading>
      <div class="panel-body">
        <div *ngFor="let entry of extractedFieldEntries; let i = index"
             class="field-row"
             [class.not-found]="entry[1] === '(niet gevonden)'"
             [class.has-default]="entry[1].startsWith('(default)')">
          <span class="field-name">{{ entry[0] }}</span>
          <bldc-tag *ngIf="entry[1] === '(niet gevonden)'" value="Niet gevonden" type="status" color="negative" size="xs"></bldc-tag>
          <bldc-tag *ngIf="entry[1].startsWith('(default)')" [attr.value]="entry[1]" type="status" size="xs"></bldc-tag>
          <bldc-tag *ngIf="entry[1] !== '(niet gevonden)' && !entry[1].startsWith('(default)')" [attr.value]="entry[1]" type="status" color="positive" size="xs"></bldc-tag>
        </div>
      </div>
    </div>

    <!-- Center: Arrow -->
    <div class="comparison-arrow">
      <bldc-heading level="4">YAML Mapping</bldc-heading>
      <bldc-icon name="arrow-right"></bldc-icon>
    </div>

    <!-- Right: JSON Output -->
    <div class="output-panel">
      <bldc-heading level="3">JSON Output ({{ jsonLineCount }} regels)</bldc-heading>
      <div class="panel-body json-body">
        <pre class="json-output"><code>{{ jsonFormatted }}</code></pre>
      </div>
    </div>
  </div>
</bldc-container>
